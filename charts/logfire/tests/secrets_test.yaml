suite: existingSecret wiring
release:
  name: lf
  namespace: default
set:
  adminEmail: test@example.com
  objectStore:
    uri: s3://test-bucket
  dev:
    deployPostgres: true
tests:
  - it: chart generates jwt secret when existingSecret is disabled
    set:
      existingSecret:
        enabled: false
    templates:
      - templates/secrets.yaml
    asserts:
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: logfire-jwt-secret
          any: true
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: logfire-meta-write-token
          any: true
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: logfire-encryption-key
          any: true

  - it: chart skips generated secrets when existingSecret is enabled
    set:
      existingSecret:
        enabled: true
        name: my-shared-secret
    templates:
      - templates/secrets.yaml
    asserts:
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: logfire-jwt-secret
        not: true
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: logfire-meta-write-token
        not: true
      - containsDocument:
          kind: Secret
          apiVersion: v1
          name: logfire-encryption-key
        not: true

  - it: backend env points at existingSecret.name when enabled
    set:
      existingSecret:
        enabled: true
        name: my-shared-secret
    templates:
      - templates/logfire-backend.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            valueFrom:
              secretKeyRef:
                name: my-shared-secret
                key: logfire-jwt-secret
          any: true
        documentSelector:
          path: kind
          value: Deployment

  - it: backend env points at per-key chart-managed secret when existingSecret is disabled
    set:
      existingSecret:
        enabled: false
    templates:
      - templates/logfire-backend.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            valueFrom:
              secretKeyRef:
                name: logfire-jwt-secret
                key: logfire-jwt-secret
          any: true
        documentSelector:
          path: kind
          value: Deployment

  - it: existingSecret.enabled=true with empty name fails validation
    set:
      existingSecret:
        enabled: true
        name: ""
    asserts:
      - failedTemplate:
          errorMessage: "existingSecret.name is required when existingSecret.enabled is true. Provide the name of your Kubernetes Secret containing logfire-dex-client-secret, logfire-encryption-key, logfire-meta-write-token, logfire-meta-frontend-token, logfire-jwt-secret and logfire-unsubscribe-secret keys."
