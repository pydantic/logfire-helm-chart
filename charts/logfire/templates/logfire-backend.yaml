{{- $serviceName := "logfire-backend" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ $serviceName }}
  labels:
    {{- include "logfire.labels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $serviceName }}
  annotations:
    {{- include "logfire.serviceAnnotations" (dict "Values" .Values "serviceName" $serviceName) | nindent 4 }}
spec:
  selector:
    {{- include "logfire.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: {{ $serviceName }}
  ports:
  - port: 8000
    targetPort: 8000
    name: "http"
  {{- include "logfire.inClusterTls.https.servicePort" (dict "ctx" . "targetPort" "https") | nindent 2 }}
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $serviceName }}
  labels:
    {{- include "logfire.labels" . | nindent 4 }}
    {{- include "logfire.workloadLabels" (dict "Values" .Values "serviceName" $serviceName) | nindent 4 }}
    app.kubernetes.io/component: {{ $serviceName }}
  annotations: 
    {{- include "logfire.secretAnnotations" . | nindent 4 }}
    {{- include "logfire.annotations" (dict "Values" .Values "serviceName" $serviceName) | nindent 4 }}
spec:
  {{- include "logfire.replicas" (dict "Values" .Values "serviceName" $serviceName) | nindent 2 }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "logfire.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: {{ $serviceName }}
  template:
    metadata:
      annotations:
        {{- if or (not .Values.existingSecret.enabled) (empty .Values.existingSecret.annotations) }}
        checksum/logfire-dex-client-secret: {{ include "utils.secretChecksum" (dict "ctx" . "name" (include "logfire.secretName" (dict "ctx" . "secretName" "logfire-dex-client-secret" )) "key" "logfire-dex-client-secret" )}}
        checksum/logfire-encryption-key: {{ include "utils.secretChecksum" (dict "ctx" . "name" (include "logfire.secretName" (dict "ctx" . "secretName" "logfire-encryption-key" )) "key" "logfire-encryption-key" )}}
        checksum/logfire-jwt-client-secret: {{ include "utils.secretChecksum" (dict "ctx" . "name" (include "logfire.secretName" (dict "ctx" . "secretName" "logfire-jwt-secret" )) "key" "logfire-jwt-secret" )}}
        checksum/logfire-meta-frontend-token: {{ include "utils.secretChecksum" (dict "ctx" . "name" (include "logfire.secretName" (dict "ctx" . "secretName" "logfire-meta-frontend-token" )) "key" "logfire-meta-frontend-token" )}}
        checksum/logfire-meta-write-token: {{ include "utils.secretChecksum" (dict "ctx" . "name" (include "logfire.secretName" (dict "ctx" . "secretName" "logfire-meta-write-token" )) "key" "logfire-meta-write-token" )}}
        checksum/logfire-unsubscribe-secret: {{ include "utils.secretChecksum" (dict "ctx" . "name" (include "logfire.secretName" (dict "ctx" . "secretName" "logfire-unsubscribe-secret" )) "key" "logfire-unsubscribe-secret" )}}
        checksum/logfire-mcp-oauth-client-secret: {{ include "utils.secretChecksum" (dict "ctx" . "name" (include "logfire.secretName" (dict "ctx" . "secretName" "logfire-mcp-oauth-client-secret" )) "key" "logfire-mcp-oauth-client-secret" )}}
        {{- end }}
        {{- if (index .Values "logfire-ai-gateway" "enabled") }}
        {{- $gwEx := get .Values "existingGatewaySecret" | default dict }}
        {{- if or (not (get $gwEx "enabled")) (empty (get $gwEx "annotations")) }}
        checksum/gateway-encryption: {{ include "utils.secretChecksum" (dict "ctx" . "name" (include "logfire.gatewaySecretName" (dict "ctx" . "secretName" "gateway-encryption")) "key" "key" )}}
        checksum/gateway-internal-secret: {{ include "utils.secretChecksum" (dict "ctx" . "name" (include "logfire.gatewaySecretName" (dict "ctx" . "secretName" "gateway-internal-secret")) "key" "internalSecret" )}}
        {{- end }}
        {{- end }}
        {{- if or (not .Values.postgresSecret.enabled) (empty .Values.postgresSecret.annotations) }}
        checksum/logfire-postgres-dsn: {{ include "utils.secretChecksum" (dict "ctx" . "name" (include "logfire.postgresSecretName" .) "key" "postgresDsn" )}}
        {{- end }}
        {{- include "logfire.podAnnotations" (dict "Values" .Values "serviceName" $serviceName) | nindent 8 }}
      labels:
        {{- include "logfire.selectorLabels" . | nindent 8 }}
        {{- include "logfire.podLabels" (dict "Values" .Values "serviceName" $serviceName) | nindent 8 }}
        app.kubernetes.io/component: {{ $serviceName }}
    spec:
      priorityClassName: {{ .Values.priorityClassName }}
      serviceAccountName: {{ include "logfire.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
      {{- range . }}
        - name: {{ . | quote }}
      {{- end }}
      {{- end }}
      {{- include "logfire.initContainers" (dict "ctx" . "serviceName" $serviceName) | nindent 6}}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- include "logfire.podScheduling" (dict "Values" .Values "serviceName" $serviceName) | nindent 6}}
      containers:
        - name: {{ $serviceName }}
          image: '{{ .Values.image.repository | default "" }}{{ .Values.image.backendImage }}:{{ include "logfire.serviceTag" (dict "Values" .Values "serviceName" $serviceName "Chart" .Chart) }}'
          imagePullPolicy: "{{ .Values.image.pullPolicy }}"
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- include "logfire.resources" (dict "Values" .Values "serviceName" $serviceName) | nindent 10 }}
          command: ["python", "-m", "logfire_backend"]
          ports:
            - containerPort: 8000
            {{- include "logfire.inClusterTls.https.containerPort" (dict "ctx" .) | nindent 12 }}
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 2
          env:
            - name: APP_PORT
              value: "8000"
            - name: CRUD_PG_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "logfire.postgresSecretName" . }}
                  key: postgresDsn
            - name: SHARED_REDIS_DSN
              value: {{ .Values.redisDsn }}
            - name: REDIS_DSN
              value: {{ .Values.redisDsn }}
            - name: WORKER_REDIS_DSN
              value: {{ .Values.redisDsn }}
            - name: DEX_INTERNAL_URL
              value: "{{ include "logfire.scheme" . }}://logfire-dex:{{ include "logfire.port" (dict "port" 5556 "root" .) }}"
            {{- if (include "logfire.inClusterTls.enabled" . | eq "true") }}
            - name: LOGFIRE_CA_PATH
              value: /etc/logfire/incluster-ca/ca.crt
            - name: HTTPS_PORT
              value: "{{ .Values.inClusterTls.httpsPort }}"
            - name: TLS_CERT_PATH
              value: "/etc/tls/tls.crt"
            - name: "TLS_KEY_PATH"
              value: "/etc/tls/tls.key"
            {{- end }}
            {{- with .Values.ai }}
            {{- with .model }}
            - name: AI_MODEL_DEFAULT
              value: {{ . }}
            {{- end }}
            {{- with .chatModel }}
            - name: AI_MODEL_CHAT
              value: {{ . }}
            {{- end }}
            {{ include "logfire.aiProviderEnv" $ | nindent 12 }}
            {{- with .enterpriseModel }}
            - name: AI_ENTERPRISE_MODEL_DEFAULT
              value: {{ . }}
            {{- end }}
            {{- with .enterpriseChatModel }}
            - name: AI_ENTERPRISE_MODEL_CHAT
              value: {{ . }}
            {{- end }}
            {{- end }}
            - name: DEX_CLIENT_ID
              value: {{ include "logfire.dexClientId" . }}
            - name: DEX_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "logfire.secretName" (dict "ctx" . "secretName" "logfire-dex-client-secret") }}
                  key: logfire-dex-client-secret
            - name: ON_PREM
              value: "true"
            - name: BROWSER_TELEMETRY_COLLECTOR_OTLP_HTTP_HOST
              value: http://logfire-otel-collector:4318
            - name: COLLECTOR_OTLP_GRPC_HOST
              value: http://logfire-otel-collector:4317
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ include "logfire.otelResourceAttributes" (dict "root" . "serviceName" $serviceName "codeWorkDir" "/app") | quote }}
            - name: LOGFIRE_SERVICE_NAME
              value: {{ $serviceName }}
            - name: LOGFIRE_SERVICE_VERSION
              value: {{ include "logfire.serviceVersion" (dict "root" . "serviceName" $serviceName) | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "logfire.secretName" (dict "ctx" . "secretName" "logfire-jwt-secret") }}
                  key: logfire-jwt-secret
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "logfire.secretName" (dict "ctx" . "secretName" "logfire-encryption-key") }}
                  key: logfire-encryption-key
            - name: FUSIONFIRE_QUERY_HOST
              value: "{{ include "logfire.scheme" . }}://logfire-ff-query-api"
            - name: FUSIONFIRE_QUERY_PORT
              value: "{{ include "logfire.port" (dict "port" 8011 "root" .) }}"
            - name: FUSIONFIRE_INGEST_HOST
              value: "{{ include "logfire.scheme" . }}://logfire-ff-ingest-processor"
            - name: FUSIONFIRE_INGEST_PORT
              value: "{{ include "logfire.port" (dict "port" 8012 "root" .) }}"
            - name: FUSIONFIRE_CRUD_HOST
              value: "{{ include "logfire.scheme" . }}://logfire-ff-crud-api"
            - name: FUSIONFIRE_CRUD_PORT
              value: "{{ include "logfire.port" (dict "port" 8011 "root" .) }}"
            {{- if (index .Values "logfire-ai-gateway" "enabled") }}
            - name: GATEWAY_BASE_URL
              value: "{{ include "logfire.scheme" . }}://logfire-ai-gateway:{{ include "logfire.port" (dict "port" 8788 "root" .) }}"
            - name: GATEWAY_OAUTH_RESOURCE_URL
              value: {{ include "logfire.gatewayOauthResourceUrl" . | trim | quote }}
            {{- end }}
            {{- if (index .Values "logfire-ai-gateway" "enabled") }}
            - name: GATEWAY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  key: key
                  name: {{ include "logfire.gatewaySecretName" (dict "ctx" . "secretName" "gateway-encryption") }}
            - name: GATEWAY_INTERNAL_SECRET
              valueFrom:
                secretKeyRef:
                  key: internalSecret
                  name: {{ include "logfire.gatewaySecretName" (dict "ctx" . "secretName" "gateway-internal-secret") }}
            {{- end }}
            - name: MIN_DATE_USAGE_CHART  # TODO: make this optional?
              value: "2025-01-01"
            - name: DEFAULT_SUBSCRIPTION_PLAN
              value: non_stripe
            - name: DEFAULT_PERSONAL_SUBSCRIPTION_PLAN
              value: non_stripe
            - name: LOGFIRE_REGION
              value: {{ .Values.logfireRegion | default "local" }}
            - name: KNOWN_LOGFIRE_REGIONS
              value: '[{"name": "local", "frontend_host": "{{ include "logfire.url" . }}", "api_host": "{{ include "logfire.url" . }}", "auth_host": "{{ include "logfire.url" . }}"}]'
            - name: FRONTEND_HOST
              value: {{ include "logfire.url" . | quote }}
            {{- include "logfire.rateLimits" . | nindent 12 }}
            - name: META_WRITE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "logfire.secretName" (dict "ctx" . "secretName" "logfire-meta-write-token") }}
                  key: logfire-meta-write-token
            - name: META_FRONTEND_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "logfire.secretName" (dict "ctx" . "secretName" "logfire-meta-frontend-token") }}
                  key: logfire-meta-frontend-token
            - name: UNSUBSCRIBE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "logfire.secretName" (dict "ctx" . "secretName" "logfire-unsubscribe-secret") }}
                  key: logfire-unsubscribe-secret
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "logfire.adminSecretName" (dict "ctx" . "secretName" "logfire-admin-password") }}
                  key: logfire-admin-password
            - name: ADMIN_TOTP_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "logfire.adminSecretName" (dict "ctx" . "secretName" "logfire-admin-totp-secret") }}
                  key: logfire-admin-totp-secret
            - name: ADMIN_TOTP_RECOVERY_CODES
              valueFrom:
                secretKeyRef:
                  name: {{ include "logfire.adminSecretName" (dict "ctx" . "secretName" "logfire-admin-totp-recovery-codes") }}
                  key: logfire-admin-totp-recovery-codes
            {{- /* MCP OAuth2 is not supported without TLS for hostnames different than localhost */ -}}
            {{- if or (include "logfire.effective_tls" . | eq "true") (eq (include "logfire.primary_hostname" .) "localhost") }}
            - name: MCP_OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "logfire.secretName" (dict "ctx" . "secretName" "logfire-mcp-oauth-client-secret") }}
                  key: logfire-mcp-oauth-client-secret
            {{- end }}
            {{- include "logfire.groupOrganizationMapping" . | nindent 12 }}
            - name: BOOTSTRAPPED_ORGANIZATIONS
              # This will make it possible to log-in sans-credentials by visiting a URL like:
              # http://localhost:8080/logfire-meta/logfire-meta#token=U8TO1taNdD7YwgBMcfeQVU7RB6Hgtrwd
              # You'll need to get the right host and get the secret from k8s
              value: '[{"admin_user_email": "{{ .Values.adminEmail }}", "admin_user_password": "$(ADMIN_PASSWORD)", "admin_user_totp_secret": "$(ADMIN_TOTP_SECRET)", "admin_user_totp_recovery_codes": $(ADMIN_TOTP_RECOVERY_CODES), "organization_name": "logfire-meta", "projects": [{"project_name": "logfire-meta", "write_token": "$(META_WRITE_TOKEN)", "permanent_frontend_token": "$(META_FRONTEND_TOKEN)"}]{{- if or (include "logfire.effective_tls" . | eq "true") (eq (include "logfire.primary_hostname" .) "localhost") }}, "oauth_clients": [{"client_id": "logfire-mcp", "client_secret": "$(MCP_OAUTH_CLIENT_SECRET)", "client_name": "Logfire Remote MCP Server", "redirect_uris": ["{{ include "logfire.url" . }}/mcp/oauth/callback"], "allowed_scopes": ["project:read", "project:write", "project:write_token", "project:read_dashboard", "project:write_dashboard", "project:read_alert", "project:write_alert", "organization:create_project", "organization:read_channel", "organization:write_channel"]}]{{- end }}}]'
            {{- with (index .Values $serviceName | default dict).env }}
              {{- . | toYaml | nindent 12 }}
            {{- end}}
          {{- if (include "logfire.inClusterTls.enabled" . | eq "true") }}
          volumeMounts:
            {{- include "logfire.inClusterTls.caBundle.volumeMount" (dict "ctx" . "mountPath" "/etc/logfire/incluster-ca") | nindent 12 }}
            {{- include "logfire.inClusterTls.server.volumeMount" (dict "ctx" . "mountPath" "/etc/tls") | nindent 12 }}
          {{- end }}
      {{- if (include "logfire.inClusterTls.enabled" . | eq "true") }}
      volumes:
        {{- include "logfire.inClusterTls.caBundle.volume" (dict "ctx" .) | nindent 8 }}
        {{- include "logfire.inClusterTls.server.volume" (dict "ctx" . "serviceName" $serviceName) | nindent 8 }}
      {{- end }}
{{- template "logfire.autoscaler" (dict "Values" .Values "serviceName" $serviceName) }}
{{- template "logfire.pdb" (dict "root" $ "serviceName" $serviceName) }}
