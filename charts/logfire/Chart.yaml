apiVersion: v2
version: 0.13.17
name: logfire
description: Helm chart for self-hosted Pydantic Logfire

appVersion: "de5d9121"

dependencies:
  - name: cert-manager
    version: "v1.19.2"
    repository: "https://charts.jetstack.io"
    condition: dev.deployCertManager
  - name: rustfs
    version: "0.3.0"
    repository: "https://charts.rustfs.com"
    condition: dev.deployObjectStore
