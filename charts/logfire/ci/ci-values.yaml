adminEmail: hello@example.dev
sizingPreset: dev

# -- test with security context
podSecurityContext:
  fsGroup: 2000

ingress:
  enabled: true
  tls: false
  hostnames:
  - logfire.example.com
  maildevHostname: maildev.example.com

objectStore:
  uri: s3://logfire
  env:
    AWS_ACCESS_KEY_ID: logfire-minio
    AWS_SECRET_ACCESS_KEY: logfire-minio
    AWS_ENDPOINT: http://logfire-minio:9000
    AWS_ALLOW_HTTP: "true"

dev:
  deployPostgres: true
  deployMinio: true
  deployMaildev: true

postgresSecret:
  enabled: true
  name: "pg-dsns"

existingSecret:
  enabled: true
  name: "logfire-tokens"

adminSecret:
  enabled: true
  name: "logfire-admin"

existingGatewaySecret:
  enabled: true
  name: "logfire-gateway"

logfire-dex:
  config:
    storage:
      type: postgres
      config:
        host: logfire-postgres
        port: 5432
        user: postgres
        database: dex
        password: postgres
        ssl:
          mode: disable
    staticClients: []

logfire-backend:
  pdb:
    minUnavailable: 1

logfire-ff-maintenance-worker:
  scratchVolume:
    storageClassName: standard

logfire-ff-ingest:
  volumeClaimTemplates:
    storageClassName: standard
    storage: "1Gi"

logfire-ff-compaction-worker:
  scratchVolume:
    storageClassName: standard

logfire-ai-gateway:
  enabled: true

postgresql:
  primary:
    persistence:
      size: 1Gi

minio:
  persistence:
    enabled: false
