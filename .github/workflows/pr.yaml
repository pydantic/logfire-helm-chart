name: Test Chart

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: depot-ubuntu-24.04-16
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          # v4.2.1 hangs during kind/local-path uninstall waits in chart-testing.
          version: v4.2.0

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.1.1 --verify=false

      - name: Run helm unittest
        run: helm unittest charts/logfire

      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          check-latest: true

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Chart linting
        run: ct lint --config ci/ct.yaml

      - name: Set up GCP auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}
          token_format: 'access_token'
          access_token_lifetime: 900s

      - name: Generate pull secret
        env:
          DOCKER_CONFIG: "."
          REPOSITORY: "us-docker.pkg.dev"
        run: |
          echo "::add-mask::${{ steps.auth.outputs.access_token }}"
          cat <<EOF >"${DOCKER_CONFIG}/config.json"
          {
           "auths": { "${REPOSITORY}": {} }
          }
          EOF
          echo "${{ steps.auth.outputs.access_token }}" | docker login -u oauth2accesstoken --password-stdin "${REPOSITORY}"

      - name: Create Kind Cluster
        uses: helm/kind-action@v1
        with:
          config: 'ci/kind.yaml'

      - name: Create k8s secrets
        run: |
          kubectl create secret generic pg-dsns \
            --from-literal="postgresDsn=postgres://postgres:postgres@logfire-postgres:5432/crud" \
            --from-literal="postgresFFDsn=postgres://postgres:postgres@logfire-postgres:5432/ff" \

          kubectl create secret generic logfire-tokens \
            --from-literal="logfire-dex-client-secret=$(date +%s%N | sha256sum | head -c 32)" \
            --from-literal="logfire-meta-write-token=$(date +%s%N | sha256sum | head -c 32)" \
            --from-literal="logfire-meta-frontend-token=$(date +%s%N | sha256sum | head -c 32)" \
            --from-literal="logfire-jwt-secret=$(date +%s%N | sha256sum | head -c 32)" \
            --from-literal="logfire-unsubscribe-secret=$(date +%s%N | sha256sum | head -c 32)" \
            --from-literal="logfire-encryption-key=$(head -c 32 /dev/urandom | base64 | tr -d '\n')" \
            --from-literal="logfire-mcp-oauth-client-secret=$(date +%s%N | sha256sum | head -c 32)"

          kubectl create secret generic logfire-admin \
            --from-literal="logfire-admin-password=$(date +%s%N | sha256sum | head -c 32)" \
            --from-literal="logfire-admin-totp-secret=$(head -c 20 /dev/urandom | base32 | tr -d '=' | head -c 32)" \
            --from-literal="logfire-admin-totp-recovery-codes=[\"$(date +%s%N | sha256sum | head -c 32)\"]" \
            --from-literal="logfire-jwt-secret=$(date +%s%N | sha256sum | head -c 32)"

          kubectl create secret generic logfire-gateway \
            --from-literal="key=$(head -c 32 /dev/urandom | base64 | tr '+/' '-_' | tr -d '\n')" \
            --from-literal="internalSecret=$(date +%s%N | sha256sum | head -c 32)"

      - name: Run chart testing
        run: ct install --upgrade --config ci/ct.yaml

      - name: Install chart for integration tests
        run: |
          helm dependency update charts/logfire
          helm install lf charts/logfire \
            -f charts/logfire/ci/ci-values.yaml \
            --wait --timeout 10m

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run integration tests
        run: |
          kubectl port-forward -n default svc/logfire-service 8080:8080 &
          PF_PID=$!
          trap "kill ${PF_PID} 2>/dev/null || true" EXIT
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:8080/ui-api/platform-config/ >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          META_FRONTEND_TOKEN=$(kubectl get secret logfire-tokens -n default -o jsonpath='{.data.logfire-meta-frontend-token}' | base64 -d) \
            uv run --directory tests/integration pytest -v
